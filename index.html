<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Bus Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loaderOverlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    @media print {
    body * { visibility: hidden; }
    #receiptPrintArea, #receiptPrintArea * { visibility: visible; }
    #receiptPrintArea { 
        position: absolute; left: 0; top: 0; width: 105mm; height: 148mm; /* A6 size (1/4 A4) */
        border: 1px solid #000; padding: 10px;
    }
}

/* Profile Modern UI */
.profile-card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
}
.contact-chip {
    display: inline-flex;
    align-items: center;
    background: #f0fdf4;
    color: #166534;
    padding: 0.5rem 1rem;
    border-radius: 12px;
    border: 1px solid #bbf7d0;
    text-decoration: none;
    transition: 0.2s;
}
.contact-chip:hover { background: #dcfce7; }

/* Fixed A4 Portrait Print Logic */
/* Fixed A4 Portrait Print Logic */
@media print {
    /* Forces the browser to remove headers/footers (URLs and dates) */
    @page { 
        size: A4 portrait; 
        margin: 0; 
    }
    
    body { 
        margin: 1cm; /* This adds margin to the content instead of the page */
    }

    /* Hide everything except the profile content */
    body * { visibility: hidden; }
    #tabContent, #tabContent * { visibility: visible; }
    
    #tabContent { 
        position: absolute; 
        left: 0; 
        top: 0; 
        width: 100%; 
        padding: 20px;
    }

    /* Specifically hide the download button during the print process */
    .no-print { display: none !important; }
}


    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
    <div id="loaderOverlay"><div class="loader mb-2"></div><p class="font-bold text-blue-600">Processing...</p></div>

    <header id="appHeader" class="hidden bg-blue-700 text-white p-4 shadow flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-white text-blue-700 font-bold rounded-full flex items-center justify-center">Logo</div>
            <h1 class="text-xl font-bold">Bus Portal</h1>
        </div>
        <div class="text-right">
            <p id="welcomeUser" class="font-semibold"></p>
            <p id="sessionTime" class="text-xs text-blue-200"></p>
        </div>
        <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded text-sm font-bold shadow">Logout</button>
    </header>

    <div id="loginSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
            <h2 class="text-2xl font-bold text-center mb-6">Combined Login</h2>
            <div class="bg-gray-50 p-4 rounded border mb-4">
                <h3 class="font-bold text-sm text-gray-600 mb-2">STUDENT LOGIN</h3>
                <input type="text" id="stuSearch" placeholder="Phone or Name" class="w-full p-2 border rounded mb-2 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="loginStudent()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Search</button>
            </div>
            <div class="text-center font-bold text-gray-400 mb-4">OR</div>
            <div class="bg-gray-50 p-4 rounded border">
                <h3 class="font-bold text-sm text-gray-600 mb-2">OFFICIAL LOGIN</h3>
                <input type="text" id="offUser" placeholder="User ID" class="w-full p-2 border rounded mb-2 outline-none">
                <input type="password" id="offPass" placeholder="Password" class="w-full p-2 border rounded mb-2 outline-none">
                <label class="flex items-center gap-2 mb-2 text-sm"><input type="checkbox"> Keep me logged in</label>
                <button onclick="loginOfficial()" class="w-full bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700">Login</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden p-4 max-w-7xl mx-auto">
        <div id="tabs" class="flex flex-wrap gap-2 mb-4 border-b pb-2"></div>
        <div id="tabContent" class="bg-white p-4 rounded-lg shadow min-h-[60vh]"></div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwFlgdSjieGK_sTyKOTv3QPOeAoB3HCFVVEljbPHDIP83nNSSM54i7tpamXVxSYIPj17A/exec";
    const users = {
        "bus1": { pass: "buspass", role: "Bus", name: "Bus KL 32S 3091", filter: "KL 32S 3091", access: [2] },
        "teacher1": { pass: "teachpass", role: "Teacher", name: "Teacher A", tClass: "STD5", tDiv: "A", access: [1,2,4] },
        "school1": { pass: "schpass", role: "School", name: "TDEMNS Admin", tSchool: "TDEMNS", access: [1,3,4] },
        "admin": { pass: "adminpass", role: "Admin", name: "Super Admin", access: [1,2,3,4,5] }
    };
    
    let curUser=null, loginDT=null, durInt=null, inactTimer=null;
    let db = []; // Holds all student data
    let editID = null;

    const showLoad = () => document.getElementById('loaderOverlay').style.display='flex';
    const hideLoad = () => document.getElementById('loaderOverlay').style.display='none';
    const msg = (t, txt, i="info") => Swal.fire({title:t, text:txt, icon:i, confirmButtonColor:'#3b82f6'});

    // --- Session & Core ---
    function resetTimer() {
        clearTimeout(inactTimer);
        if(curUser) inactTimer = setTimeout(logout, 60000);
    }
    window.onload = resetTimer; document.onmousemove = resetTimer; document.onkeypress = resetTimer;

    async function fetchData() {
        showLoad();
        try {
            const r = await fetch(API_URL, {method:'POST', body:JSON.stringify({action:"getStudents"})}).then(x=>x.json());
            if(r.success) db = r.data;
        } catch(e) { msg("Error", "Network Fail", "error"); }
        hideLoad();
    }

    async function loginStudent() {
        const q = document.getElementById('stuSearch').value.toLowerCase();
        if(!q) return;
        await fetchData();
        const s = db.find(x => String(x.Phone).includes(q) || String(x.StudentName).toLowerCase().includes(q));
        if(s) startSession({role:"Student", name:s.StudentName, data:s});
        else msg("Not Found","No records match.","warning");
    }

    function loginOfficial() {
        const u = document.getElementById('offUser').value, p = document.getElementById('offPass').value;
        if(users[u] && users[u].pass === p) { startSession(users[u]); } else msg("Error","Invalid Login","error");
    }

    async function startSession(u) {
        curUser = u; loginDT = new Date(); resetTimer();
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('appHeader').classList.remove('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('welcomeUser').innerText = `Hello, ${u.name}`;
        durInt = setInterval(()=>{
            const d = Math.floor((new Date()-loginDT)/1000);
            document.getElementById('sessionTime').innerText = `Duration: ${Math.floor(d/60)}m ${d%60}s`;
        }, 1000);
        
        fetch(API_URL, {method:'POST', body:JSON.stringify({action:"log", user:u.name, type:"login"})});
        if(u.role !== "Student") await fetchData();
        renderTabs();
    }

    function logout() {
        curUser = null; clearInterval(durInt); clearTimeout(inactTimer);
        document.getElementById('loginSection').classList.remove('hidden');
        document.getElementById('appHeader').classList.add('hidden');
        document.getElementById('mainApp').classList.add('hidden');
        ['stuSearch','offUser','offPass'].forEach(id=>document.getElementById(id).value='');
    }

    // --- UI Routing ---
    function renderTabs() {
        const t = document.getElementById('tabs'); t.innerHTML = '';
        if(curUser.role === "Student") { loadTab(0); return; }
        const n = {1:"Students Record", 2:"Attendance", 3:"Data", 4:"Fee", 5:"Receipt Management"};
        curUser.access.forEach(id => {
            const b = document.createElement('button');
            b.className = "px-4 py-2 bg-gray-200 hover:bg-blue-200 font-bold rounded text-sm";
            b.innerText = n[id]; b.onclick = () => loadTab(id); t.appendChild(b);
        });
        loadTab(curUser.access[0]);
    }

    function loadTab(id) {
        const c = document.getElementById('tabContent');
        if(id === 0) renderStudentDash(c);
        if(id === 1) renderTab1(c);
        if(id === 2) renderTab2(c);
        if(id === 3) renderTab3(c);
        if(id === 4) renderTab4(c);
        if(id === 5) renderTab5(c);
        
    }

    // --- Filters ---
    function getFilteredDB() {
        return db.filter(s => {
            if(curUser.role==="Admin") return true;
            if(curUser.role==="School") return s.School === curUser.tSchool;
            if(curUser.role==="Teacher") return s.Class === curUser.tClass && s.Div === curUser.tDiv;
            if(curUser.role==="Bus") return s.BusId === curUser.filter;
            return false;
        });
    }

    // --- Student Dashboard (Login 1) ---
    function renderStudentDash(c) {
    const d = curUser.data;
    const months = ["Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];
    
    // Format rows: Extracting only Date from the Sheet's DateTime string
    let trs = months.map(m => {
        const paid = d[m] && parseFloat(d[m]) > 0;
        // Use the new helper function here
        let dateOnly = paid ? formatMyDate(d[m+'DateTime']) : '-';

        return `
            <tr class="border-b text-sm hover:bg-gray-50">
                <td class="p-4 font-bold text-gray-700">${m}</td>
                <td class="p-4 font-bold ${paid ? 'text-green-600':'text-gray-300'}">
                    ${paid ? '₹'+d[m] : '---'}
                </td>
                <td class="p-4 text-gray-600 font-medium">${dateOnly}</td>
                <td class="p-4 text-gray-400 text-xs tracking-wider">${d[m+'Receipt'] || '-'}</td>
            </tr>`;
    }).join('');

    c.innerHTML = `
        <div class="max-w-4xl mx-auto space-y-6 animate-fade-in">
            <div class="profile-card p-6 border border-gray-100">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="flex items-center gap-4">
                        <div class="h-16 w-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-2xl font-black shadow-lg">
                            ${d.StudentName.charAt(0)}
                        </div>
                        <div>
                            <h2 class="text-2xl font-black text-gray-800">${d.StudentName}</h2>
                            <p class="text-gray-500 text-sm font-medium uppercase tracking-tight">${d.School} • Bus ${d.BusId}</p>
                        </div>
                    </div>
                    <button onclick="window.print()" class="no-print bg-gray-800 text-white px-5 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-black transition">
                        <span>📥</span> Download PDF (A4)
                    </button>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8 border-t pt-6">
                    <div><p class="text-[10px] text-gray-400 font-bold uppercase">Class</p><p class="font-bold">${d.Class}-${d.Div}</p></div>
                    <div><p class="text-[10px] text-gray-400 font-bold uppercase">Phone</p><p class="font-bold">${d.Phone}</p></div>
                    <div><p class="text-[10px] text-gray-400 font-bold uppercase">Paid</p><p class="font-bold text-green-600">₹${d.Total || 0}</p></div>
                    <div><p class="text-[10px] text-gray-400 font-bold uppercase">Balance</p><p class="font-bold text-red-600">₹${d.Balance || 0}</p></div>
                </div>
            </div>

            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-[10px] uppercase text-gray-400 font-bold tracking-widest">
                            <th class="p-4">Month</th><th class="p-4">Amt</th><th class="p-4">Date</th><th class="p-4">Receipt</th>
                        </tr>
                    </thead>
                    <tbody>${trs}</tbody>
                </table>
            </div>

            <div class="p-6 bg-blue-50 rounded-2xl border border-blue-100 flex flex-col md:flex-row items-center justify-between gap-4">
                <div>
                    <h4 class="font-bold text-blue-900 text-sm">For More Details Contact:</h4>
                    <p class="text-blue-700 text-lg font-black">G Mahesh Kumar</p>
                </div>
                <a href="tel:9497731772" class="contact-chip shadow-sm">
                    <span class="mr-2">📞</span> 
                    <span class="font-black text-lg">9497731772</span>
                </a>
            </div>
        </div>
    `;
}

function downloadStudentPDF() {
    // 1. Prepare the Print Area with a "Statement" layout
    const d = curUser.data;
    const months = ["Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];
    
    let html = `
        <div style="padding: 20px; font-family: sans-serif; color: #333;">
            <div style="text-align: center; border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 20px;">
                <h1 style="margin: 0; font-size: 24px;">${d.School}</h1>
                <p style="margin: 5px 0;">FEE STATEMENT / STUDENT PROFILE</p>
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
                <div>
                    <p><b>Student:</b> ${d.StudentName}</p>
                    <p><b>Class:</b> ${d.Class}-${d.Div}</p>
                    <p><b>Phone:</b> ${d.Phone}</p>
                </div>
                <div style="text-align: right;">
                    <p><b>Bus ID:</b> ${d.BusId}</p>
                    <p><b>Date:</b> ${new Date().toLocaleDateString()}</p>
                </div>
            </div>

            <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                <thead>
                    <tr style="background: #f0f0f0;">
                        <th style="border: 1px solid #ccc; padding: 10px; text-align: left;">Month</th>
                        <th style="border: 1px solid #ccc; padding: 10px; text-align: left;">Amount</th>
                        <th style="border: 1px solid #ccc; padding: 10px; text-align: left;">Receipt No</th>
                        <th style="border: 1px solid #ccc; padding: 10px; text-align: left;">Date</th>
                    </tr>
                </thead>
                <tbody>
                    ${months.map(m => `
                        <tr>
                            <td style="border: 1px solid #ccc; padding: 10px;">${m}</td>
                            <td style="border: 1px solid #ccc; padding: 10px;">₹${d[m] || '0'}</td>
                            <td style="border: 1px solid #ccc; padding: 10px;">${d[m+'Receipt'] || '---'}</td>
                            <td style="border: 1px solid #ccc; padding: 10px;">${(d[m+'DateTime'] || '').split(',')[0]}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>

            <div style="display: flex; justify-content: flex-end; gap: 20px; font-size: 18px;">
                <p><b>Total Paid:</b> ₹${d.Total || 0}</p>
                <p style="color: red;"><b>Balance:</b> ₹${d.Balance || 0}</p>
            </div>
        </div>
    `;

    document.getElementById('receiptPrintArea').innerHTML = html;
    window.print(); // Browser will open PDF Print dialog
}


    // --- Tab 1: Students Record ---
    function renderTab1(c) {
        const fDB = getFilteredDB();
        c.innerHTML = `
            <h2 class="text-2xl font-bold mb-4">Manage Students</h2>
            <form id="sForm" onsubmit="saveS(event)" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 bg-gray-50 p-4 rounded border text-sm">
                <select id="f1" required class="p-2 border rounded"><option value="">Bus</option><option>Kl 32S 3091</option><option>Kl 32P 2526</option><option>KL 32Q 2536</option><option>KL 32G 8699</option><option>KL 32K 5655</option></select>
                <select id="f2" required class="p-2 border rounded"><option value="">School</option><option>TDEMNS</option><option>GTDLPS</option><option>TDTTI</option><option>TDHS</option></select>
                <select id="f3" required class="p-2 border rounded"><option value="">Class</option><option>PRE</option><option>LKG</option><option>UKG</option><option>STD1</option><option>STD5</option><option>STD10</option></select>
                <select id="f4" required class="p-2 border rounded"><option value="">Div</option><option>A</option><option>B</option><option>C</option></select>
                <input id="f5" required placeholder="Student Name" class="p-2 border rounded md:col-span-2">
                <input id="f6" required placeholder="Parent Name" class="p-2 border rounded">
                <input id="f7" required placeholder="Phone" class="p-2 border rounded">
                <input id="f8" required placeholder="Entry Stop" class="p-2 border rounded">
                <input id="f9" required placeholder="Exit Stop" class="p-2 border rounded">
                <select id="f10" required class="p-2 border rounded"><option>Both Time</option><option>Morning Only</option><option>Evening Only</option></select>
                <input id="f11" required placeholder="Fee Amount" type="number" class="p-2 border rounded">
                <div class="col-span-2 md:col-span-4 flex gap-2"><button type="submit" id="sBtn" class="bg-blue-600 text-white px-6 py-2 rounded font-bold">Save</button><button type="button" onclick="renderTab1(document.getElementById('tabContent'))" class="bg-gray-400 text-white px-4 py-2 rounded hidden" id="cBtn">Cancel</button></div>
            </form>
            <input type="text" onkeyup="searchT1(this.value)" placeholder="Search Name or Phone..." class="w-full p-2 border-2 rounded mb-2">
            <div class="overflow-x-auto"><table class="w-full text-left text-sm border"><tr class="bg-gray-800 text-white"><th class="p-2">Bus</th><th class="p-2">Name</th><th class="p-2">Class</th><th class="p-2">Phone</th><th class="p-2">Fee</th><th class="p-2">Action</th></tr>
            <tbody id="t1Body">
                ${fDB.map(s=>`<tr><td class="p-2 border-b">${s.BusId}</td><td class="p-2 border-b font-bold">${s.StudentName}</td><td class="p-2 border-b">${s.Class}-${s.Div}</td><td class="p-2 border-b">${s.Phone}</td><td class="p-2 border-b">₹${s.Fee}</td>
                <td class="p-2 border-b"><button onclick='editS(${JSON.stringify(s).replace(/'/g,"&#39;")})' class="bg-amber-500 text-white px-2 py-1 rounded text-xs">Edit</button>
                <button onclick="delS(${s._rowIndex})" class="bg-red-500 text-white px-2 py-1 rounded text-xs ml-1">Del</button></td></tr>`).join('')}
            </tbody></table></div>
        `;
    }


    async function saveS(e) {
        e.preventDefault();
        const d = { BusId:v('f1'), School:v('f2'), Class:v('f3'), Div:v('f4'), StudentName:v('f5'), ParentName:v('f6'), Phone:v('f7'), Entry:v('f8'), Exit:v('f9'), Status:v('f10'), Fee:v('f11') };
        showLoad();
        await fetch(API_URL, {method:'POST', body:JSON.stringify({action: editID?"updateStudent":"saveStudent", data:d, rowIndex:editID})});
        editID = null; await fetchData(); hideLoad(); renderTab1(document.getElementById('tabContent')); msg("Success","Record saved!","success");
    }
    const v = (id) => document.getElementById(id).value;
    const setV = (id, val) => document.getElementById(id).value = val;

    function editS(s) {
        editID = s._rowIndex; setV('f1',s.BusId); setV('f2',s.School); setV('f3',s.Class); setV('f4',s.Div); setV('f5',s.StudentName); setV('f6',s['Parent Name']||s.ParentName); setV('f7',s.Phone); setV('f8',s.Entry); setV('f9',s.Exit); setV('f10',s.Status); setV('f11',s.Fee);
        document.getElementById('sBtn').innerText = "Update"; document.getElementById('sBtn').className = "bg-amber-500 text-white px-6 py-2 rounded font-bold"; document.getElementById('cBtn').classList.remove('hidden');
    }

    async function delS(r) {
        if(!confirm("Delete forever?")) return;
        showLoad(); await fetch(API_URL, {method:'POST', body:JSON.stringify({action:"deleteStudent", rowIndex:r})});
        await fetchData(); hideLoad(); renderTab1(document.getElementById('tabContent'));
    }
    function searchT1(q) { Array.from(document.getElementById('t1Body').rows).forEach(r=> r.style.display = r.innerText.toLowerCase().includes(q.toLowerCase())?'':'none'); }



    // --- Tab 2: Attendance ---
    function renderTab2(c) {
        c.innerHTML = `
            <h2 class="text-2xl font-bold mb-4">Mark Attendance</h2>
            <div class="flex gap-2 mb-4">
                <select id="aBus" onchange="loadAttTbl()" class="p-2 border rounded w-1/3"><option value="">Select Bus</option><option>Kl 32S 3091</option><option>Kl 32P 2526</option></select>
                <select id="aSec" class="p-2 border rounded"><option>FN</option><option>AN</option></select>
                <button onclick="saveAtt()" class="bg-green-600 text-white px-4 rounded font-bold">Submit to Sheets</button>
            </div>
            <div class="flex gap-2 mb-4 bg-gray-50 p-2 rounded">
                <select id="waNum" class="p-2 border rounded text-sm"><option value="">Select WhatsApp Contact</option><option>+919999999991</option><option>+919999999992</option></select>
                <button onclick="shareWA()" class="bg-green-500 text-white px-4 rounded text-sm">Share Report</button>
            </div>
            <div class="overflow-x-auto"><table class="w-full text-left text-sm border"><tr class="bg-gray-800 text-white"><th class="p-2">Name</th><th class="p-2">School</th><th class="p-2">Class</th><th class="p-2">Action</th></tr>
            <tbody id="attBody"><tr><td colspan="4" class="p-4 text-center">Select bus to load students</td></tr></tbody></table></div>
        `;
    }
    function loadAttTbl() {
        const bus = document.getElementById('aBus').value;
        const sList = db.filter(s => s.BusId === bus);
        document.getElementById('attBody').innerHTML = sList.map((s,i) => `<tr><td class="p-2 border-b" id="anm${i}">${s.StudentName}</td><td class="p-2 border-b" id="asc${i}">${s.School}</td><td class="p-2 border-b" id="acl${i}">${s.Class}-${s.Div}</td><td class="p-2 border-b"><select id="ast${i}" class="border p-1 rounded"><option>Present</option><option>Absent</option></select></td></tr>`).join('');
    }
    async function saveAtt() {
        const bus = document.getElementById('aBus').value, sec = document.getElementById('aSec').value;
        if(!bus) return msg("Error","Select Bus","warning");
        const r = Array.from(document.getElementById('attBody').rows).map((row,i) => ({ BusId:bus, Section:sec, Name:document.getElementById(`anm${i}`).innerText, School:document.getElementById(`asc${i}`).innerText, Class:document.getElementById(`acl${i}`).innerText, Div:"", Status:document.getElementById(`ast${i}`).value }));
        showLoad(); await fetch(API_URL, {method:'POST', body:JSON.stringify({action:"saveAttendance", data:r})}); hideLoad(); msg("Saved","Attendance logged!","success");
    }
    function shareWA() {
        const n = document.getElementById('waNum').value; if(!n) return msg("Error","Select number","warning");
        let txt = `Attendance Report - ${document.getElementById('aBus').value}\n`;
        Array.from(document.getElementById('attBody').rows).forEach((r,i) => txt += `${document.getElementById(`anm${i}`).innerText}: ${document.getElementById(`ast${i}`).value}\n`);
        window.open(`https://wa.me/${n}?text=${encodeURIComponent(txt)}`, '_blank');
    }

    // --- Tab 3: Data ---
    function renderTab3(c) {
        const fDB = getFilteredDB();

async function fetchHistory(phone) {
    const historyDiv = document.getElementById('historyArea');
    historyDiv.innerHTML = '<p class="text-gray-400 animate-pulse">Loading history...</p>';

    try {
        const res = await fetch(API_URL, {
            method: 'POST', 
            body: JSON.stringify({action: "getReceipts", phone: phone})
        }).then(r => r.json());

        if (res.success && res.data.length > 0) {
            // Remove header row if it exists in the filtered results
            const history = res.data.filter(row => row[0] !== "ReceiptNo");
            
            historyDiv.innerHTML = history.map(r => `
                <div class="flex justify-between items-center p-3 bg-white border rounded shadow-sm hover:border-blue-300 transition">
                    <div>
                        <p class="font-bold text-gray-700">${r[0]} <span class="text-xs font-normal text-gray-400">(${r[7]})</span></p>
                        <p class="text-[10px] text-gray-500">${new Date(r[1]).toLocaleString()}</p>
                    </div>
                    <div class="flex gap-2">
                         <button onclick="reprint('${r[0]}')" class="text-blue-600 text-xs font-bold border border-blue-600 px-2 py-1 rounded">Reprint</button>
                    </div>
                </div>
            `).join('');
        } else {
            historyDiv.innerHTML = '<p class="text-gray-400 text-sm italic">No generated receipt history found.</p>';
        }
    } catch (e) {
        historyDiv.innerHTML = '<p class="text-red-400 text-sm">Failed to load history.</p>';
    }
}


function formatMyDate(dateStr) {
    if (!dateStr || dateStr === '-') return '-';
    try {
        const d = new Date(dateStr);
        // Returns date in DD/MM/YYYY format
        return d.toLocaleDateString('en-GB'); 
    } catch (e) {
        // If it's already a simple string, return the first part
        return dateStr.split(',')[0];
    }
}
