<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loaderOverlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    @media print {
    body * { visibility: hidden; }
    #receiptPrintArea, #receiptPrintArea * { visibility: visible; }
    #receiptPrintArea { 
        position: absolute; left: 0; top: 0; width: 210mm; height: 297mm; /* A6 size (1/4 A4) */
        border: 1px solid #000; padding: 10px;
    }
}

/* Profile Modern UI */
.profile-card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
}
.contact-chip {
    display: inline-flex;
    align-items: center;
    background: #f0fdf4;
    color: #166534;
    padding: 0.5rem 1rem;
    border-radius: 12px;
    border: 1px solid #bbf7d0;
    text-decoration: none;
    transition: 0.2s;
}
.contact-chip:hover { background: #dcfce7; }

/* Fixed A4 Portrait Print Logic */
/* Fixed A4 Portrait Print Logic */
@media print {
    /* Forces the browser to remove headers/footers (URLs and dates) */
    @page { 
        size: A4 portrait; 
        margin: 0; 
    }
    
    body { 
        margin: 1cm; /* This adds margin to the content instead of the page */
    }

    /* Hide everything except the profile content */
    body * { visibility: hidden; }
    #tabContent, #tabContent * { visibility: visible; }
    
    #tabContent { 
        position: absolute; 
        left: 0; 
        top: 0; 
        width: 100%; 
        padding: 20px;
    }

    /* Specifically hide the download button during the print process */
    .no-print { display: none !important; }
}

#receiptPreviewContainer {
    height: 400px;
    overflow-y: auto;
    border: 1px solid #CBD5E1; /* Tailwind slate-300 */
    border-radius: 0.5rem;
    background: white;
    padding: 10px;
}


    </style>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzkLmtBhmQcmKWV0TgeWLqQsjCMso9NG02g9tzlsMbBslOZyxz16o7UpfDx-nxGx8FlRg/exec";
   const users = {
  "4201": { id: "4201",pass: "buspass",role: "Bus",name: "KL32P4201SR",filter: "KL32P4201SR",access: [2] },
  "teacher1": { id: "teacher1", pass: "teachpass",role: "Teacher",name: "Teacher A",tClass: "V",tDiv: "A",access: [1,2,4] },
  "school1": { id: "school1", pass: "schpass",role: "School",name: "TDEMNS Admin", tSchool: "TDEMNS-td1", access: [1,3,4] },
  "admin": { id: "admin", pass: "adminpass", role: "Admin", name: "Super Admin", access:[1,2,3,4,5,6] }
};
    
    let curUser=null, loginDT=null, durInt=null, inactTimer=null;
    let db = []; // Holds all student data
    let editID = null;
    let todayAtt =[];
    
    let currentFeeDB =[];
    let feeSortCol = 'StudentName';
    let feeSortAsc = true;
    
    const showLoad = () => document.getElementById('loaderOverlay').style.display='flex';
    const hideLoad = () => document.getElementById('loaderOverlay').style.display='none';
    const msg = (t, txt, i="info") => Swal.fire({title:t, text:txt, icon:i, confirmButtonColor:'#3b82f6'});

    // --- Session & Core ---
    function resetTimer() {
        clearTimeout(inactTimer);
        if(curUser) inactTimer = setTimeout(logout, 60000);
    }
    
    // This triggers immediately when the user closes the browser tab or navigates away
    window.addEventListener('beforeunload', function() {
        if (curUser && loginDT) {
            const payload = JSON.stringify({
                action: "log",
                UserId: curUser.id || curUser.name,
                Role: curUser.role,
                Name: curUser.name,
                type: "logout"
            });
            // sendBeacon forces an instant background request even while the tab is closing
            navigator.sendBeacon(API_URL, payload);
        }
    });
    
    
    window.onload = () => {
    resetTimer();
    document.onmousemove = resetTimer; document.onkeypress = resetTimer;
    const savedU = localStorage.getItem('keepUser'),
          savedP = localStorage.getItem('keepPass');

    if(savedU && savedP) {
        document.getElementById('offUser').value = savedU;
        document.getElementById('offPass').value = savedP;
        document.getElementById('keepLogin').checked = true;
        loginOfficial(); // auto-login
      }
    }



    async function fetchData() {
        showLoad();
        try {
            const r = await fetch(API_URL, {method:'POST', body:JSON.stringify({action:"getStudents"})}).then(x=>x.json());
            if(r.success) db = r.data;
        } catch(e) { msg("Error", "Network Fail", "error"); }
        hideLoad();
    }

    async function loginStudent() {
        const q = document.getElementById('stuSearch').value.toLowerCase();
        if(!q) return;
        await fetchData();
        const s = db.find(x => String(x.Phone).includes(q) || String(x.StudentName).toLowerCase().includes(q));
        if(s) startSession({role:"Student", name:s.StudentName, data:s});
        else msg("Not Found","No records match.","warning");
    }

    function loginOfficial() {
    const u = document.getElementById('offUser').value,
          p = document.getElementById('offPass').value,
          keep = document.getElementById('keepLogin').checked;

    if(users[u] && users[u].pass === p) {
        startSession(users[u]);
        if(keep) {
            localStorage.setItem('keepUser', u);
            localStorage.setItem('keepPass', p);
        } else {
            localStorage.removeItem('keepUser');
            localStorage.removeItem('keepPass');
        }
    } else {
        msg("Error","Invalid Login","error");
    }
}


    async function startSession(u) {
    curUser = u; 
    loginDT = new Date(); 
    resetTimer();
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('appHeader').classList.remove('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('welcomeUser').innerText = `Hello, ${u.name}`;
    durInt = setInterval(() => {
        const d = Math.floor((new Date() - loginDT) / 1000);
        document.getElementById('sessionTime').innerText = `Duration: ${Math.floor(d / 60)}m ${d % 60}s`;
    }, 1000);

    // Send full user info to log login time correctly
    fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
            action: "log",
            UserId: u.id || u.name,
            Role: u.role,
            Name: u.name,
            LoginTime: loginDT.toISOString(),
            type: "login"
        })
    });

    if (u.role !== "Student") await fetchData();
    renderTabs();
}

    
        


    function logout() {
    curUser = null; clearInterval(durInt); clearTimeout(inactTimer);
    logoutDT = new Date(); 
    localStorage.removeItem('keepUser');
    localStorage.removeItem('keepPass');
    document.getElementById('loginSection').classList.remove('hidden');
    document.getElementById('appHeader').classList.add('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    ['stuSearch','offUser','offPass'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('keepLogin').checked = false;
    
}
async function logout() {
    if (!curUser || !loginDT) {
        cleanupLogoutUI();
        return;
    }

    showLoad(); // Show spinner overlay

    const logoutDT = new Date();
    const durationSecs = Math.floor((logoutDT - loginDT) / 0);

    // Wait 2 seconds (simulate delay)
    await new Promise(resolve => setTimeout(resolve, 1));

    try {
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "log",
                UserId: curUser.id || curUser.name,
                Role: curUser.role,
                Name: curUser.name,
                LogoutTime: logoutDT.toISOString(),
                Duration: durationSecs,
                type: "logout"
            })
        });
    } catch (e) {
        console.error("Error logging logout:", e);
    }

    hideLoad();  // Hide spinner overlay
    cleanupLogoutUI();
}

function cleanupLogoutUI() {
    curUser = null;
    loginDT = null;
    clearInterval(durInt);
    clearTimeout(inactTimer);
    localStorage.removeItem('keepUser');
    localStorage.removeItem('keepPass');
    document.getElementById('loginSection').classList.remove('hidden');
    document.getElementById('appHeader').classList.add('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    ['stuSearch','offUser','offPass'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('keepLogin').checked = false;
}




    // --- UI Routing ---
    function renderTabs() {
        const t = document.getElementById('tabs'); t.innerHTML = '';
        if(curUser.role === "Student") { loadTab(0); return; }
        const n = {1:"Students Record", 2:"Attendance", 3:"Data", 4:"Fee", 5:"Receipt Management", 6:"Logs"};
        curUser.access.forEach(id => {
            const b = document.createElement('button');
            b.className = "px-4 py-2 bg-gray-200 hover:bg-blue-200 font-bold rounded text-sm";
            b.innerText = n[id]; b.onclick = () => loadTab(id); t.appendChild(b);
        });
        loadTab(curUser.access[0]);
    }

    function loadTab(id) {
        const c = document.getElementById('tabContent');
        if(id === 0) renderStudentDash(c);
        if(id === 1) renderTab1(c);
        if(id === 2) renderTab2(c);
        if(id === 3) renderTab3(c);
        if(id === 4) renderTab4(c);
        if(id === 5) renderTab5(c);
        if(id === 6) renderTab6(c);
        
    }

    // --- Filters ---
    function getFilteredDB() {
        return db.filter(s => {
            if(curUser.role==="Admin") return true;
            if(curUser.role==="School") return s.School === curUser.tSchool;
            if(curUser.role==="Teacher") return s.Class === curUser.tClass && s.Div === curUser.tDiv;
            if(curUser.role==="Bus") return s.BusId === curUser.filter;
            return false;
        });
    }

}

  const months = ["Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec", "Jan", "Feb", "Mar"];
  let paidMonths = months.filter(m => s[m] && parseFloat(s[m]) > 0).join(", ");

  // Build reminder message with the requested notice plus fee data
  const message = `
Dear Parent/Guardian,

Kindly note that the school bus fee for your ward, *${s.StudentName}* (${s.Class}-${s.Div}), is currently pending.

We request you to clear the outstanding amount of ₹${s.Balance || 0} at the earliest and update the payment up to date.

Your prompt attention to this matter will help ensure the smooth continuation of the transportation service.

Thank you for your cooperation.

----------------------------

*Student Details:*  
School: ${s.School}  
Class: ${s.Class}-${s.Div}  
Entry Stop: ${s.Entry || '-'}  
Exit Stop: ${s.Exit || '-'}

*Fee Details:*  
Monthly Fee: ₹${s.Fee}  
Total Paid: ₹${s.Total || 0}  
Pending Balance: ₹${s.Balance || 0}  
Paid Months: ${paidMonths || 'None'}

_This is a system generated message._

Contact: G Mahesh Kumar - 9497731772
`.trim();

  const phoneRaw = phone.toString().replace(/[^0-9]/g, '');
  const phoneWithCC = phoneRaw.startsWith('91') ? phoneRaw : '91' + phoneRaw;
  const waUrl = `https://wa.me/${phoneWithCC}?text=${encodeURIComponent(message)}`;

  window.open(waUrl, '_blank');
}

// Sorting logic handles text (Name) and numbers (Amounts/Balances) automatically
function sortFeeTable(col) {
    if (feeSortCol === col) {
        feeSortAsc = !feeSortAsc; // Toggle direction if same column clicked
    } else {
        feeSortCol = col;
        feeSortAsc = true;
    }

    currentFeeDB.sort((a, b) => {
        let valA = a[col] || '';
        let valB = b[col] || '';

        // Handle string vs number sorting
        if (col === 'StudentName') {
            valA = String(valA).toLowerCase();
            valB = String(valB).toLowerCase();
        } else {
            // Treat missing/pending fee values as 0 for sorting
            valA = parseFloat(valA) || 0;
            valB = parseFloat(valB) || 0;
        }

        if (valA < valB) return feeSortAsc ? -1 : 1;
        if (valA > valB) return feeSortAsc ? 1 : -1;
        return 0;
    });

    // Re-render only the table body
    document.getElementById('defaultFeeTableBody').innerHTML = generateFeeTableRows(currentFeeDB);
}

function formatMyDate(dateStr) {
    if (!dateStr || dateStr === '-') return '-';
    try {
        const d = new Date(dateStr);
        // Returns date in DD/MM/YYYY format
        return d.toLocaleDateString('en-GB'); 
    } catch (e) {
        // If it's already a simple string, return the first part
        return dateStr.split(',')[0];
    }
}
