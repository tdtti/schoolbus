<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>School Bus Management Portal</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f4f7fb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    #app {
      max-width: 1400px;
      width: 100%;
    }

    /* Modern glassmorphism cards */
    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      box-shadow: 0 20px 40px -10px rgba(0, 20, 30, 0.2), 0 1px 3px rgba(0,0,0,0.05);
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.5);
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .school-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #2b6c9e, #1e4b6e);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }

    .user-greeting {
      background: white;
      padding: 10px 20px;
      border-radius: 40px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .user-greeting i {
      color: #2b6c9e;
    }

    .duration {
      background: #eef3fc;
      padding: 5px 12px;
      border-radius: 30px;
      font-weight: 500;
      color: #1e4b6e;
    }

    .logout-btn {
      background: #fff0f0;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      color: #c44545;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .logout-btn:hover {
      background: #ffe0e0;
    }

    /* Login containers */
    .login-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 40px;
    }

    @media (max-width: 700px) {
      .login-container {
        grid-template-columns: 1fr;
      }
    }

    .login-box {
      background: white;
      border-radius: 32px;
      padding: 32px;
      box-shadow: 0 20px 40px -20px rgba(0,40,80,0.3);
    }

    .login-box h2 {
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #1f3a5f;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #3c5a7d;
    }

    .input-group input, .input-group select {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e6ecf5;
      border-radius: 20px;
      font-size: 16px;
      transition: 0.2s;
    }

    .input-group input:focus, .input-group select:focus {
      border-color: #2b6c9e;
      outline: none;
    }

    .btn {
      background: #2b6c9e;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-secondary {
      background: white;
      color: #2b6c9e;
      border: 2px solid #2b6c9e;
    }

    .btn:hover {
      background: #1f4b72;
    }

    .btn-secondary:hover {
      background: #e6f0fa;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 30px 0 20px;
    }

    .tab {
      padding: 12px 24px;
      background: white;
      border-radius: 40px;
      font-weight: 600;
      color: #3f5575;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
      transition: 0.2s;
      border: 1px solid transparent;
    }

    .tab.active {
      background: #2b6c9e;
      color: white;
      box-shadow: 0 10px 20px -5px #2b6c9e80;
    }

    .tab.hidden {
      display: none;
    }

    /* Loader */
    .spinner {
      border: 4px solid rgba(43, 108, 158, 0.1);
      border-left-color: #2b6c9e;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 30px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tables */
    .table-container {
      overflow-x: auto;
      border-radius: 20px;
      background: white;
      padding: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background: #f0f5fd;
      color: #1e3b5c;
      font-weight: 600;
      padding: 16px 12px;
      text-align: left;
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid #eef2f6;
    }

    .badge {
      background: #e1ecfe;
      color: #1e4b6e;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
    }

    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-bar input {
      flex: 1;
      min-width: 200px;
      padding: 14px 18px;
      border: 2px solid #e0e9f2;
      border-radius: 40px;
    }

    .action-icon {
      cursor: pointer;
      margin: 0 6px;
      color: #5f7d9e;
      transition: 0.2s;
    }

    .action-icon:hover { color: #2b6c9e; }

    .message-box {
      background: #e8f0fe;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      color: #1e3b5c;
      font-weight: 500;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .glass-card { padding: 16px; }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="glass-card header">
    <div class="logo-area">
      <div class="school-logo"><i class="fas fa-bus"></i></div>
      <h2 style="color:#1f3a5f;">School Bus Manager</h2>
    </div>
    <div id="userInfo" style="display: none;" class="user-greeting">
      <i class="fas fa-user-circle fa-2x"></i>
      <span>Hello, <span id="userName"></span> (<span id="userRole"></span>)</span>
      <span class="duration" id="sessionDuration">00:00</span>
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>

  <!-- LOGIN AREA (shown when not logged in) -->
  <div id="loginArea" class="login-container">
    <!-- Student Login -->
    <div class="login-box">
      <h2><i class="fas fa-graduation-cap" style="color:#2b6c9e;"></i> Student Login</h2>
      <div class="input-group">
        <label>Search by Phone or Name</label>
        <input type="text" id="studentSearchInput" placeholder="Enter phone or name...">
      </div>
      <button class="btn" id="studentLoginBtn"><i class="fas fa-search"></i> Search & Login</button>
      <p style="margin-top:16px;font-size:14px;color:#7a8faa;"><i class="fas fa-info-circle"></i> No password required</p>
    </div>

    <!-- Official Login -->
    <div class="login-box">
      <h2><i class="fas fa-id-card" style="color:#2b6c9e;"></i> Official Login</h2>
      <div class="input-group">
        <label>User ID</label>
        <input type="text" id="officialUserId" placeholder="e.g. bus1, teacher1, admin1">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="officialPassword" placeholder="••••••••">
      </div>
      <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px;">
        <input type="checkbox" id="keepMeLogin"> <label for="keepMeLogin">Keep me logged in</label>
      </div>
      <button class="btn" id="officialLoginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
    </div>
  </div>

  <!-- MAIN APP (hidden until login) -->
  <div id="mainApp" style="display: none;">
    <!-- Tabs -->
    <div class="tabs" id="tabContainer">
      <div class="tab active" data-tab="1">Students Record</div>
      <div class="tab" data-tab="2">Attendance</div>
      <div class="tab" data-tab="3">Data</div>
      <div class="tab" data-tab="4">Fee</div>
    </div>

    <!-- Tab Content -->
    <div id="tabContent" class="glass-card">
      <!-- Spinner (shown during load) -->
      <div id="loader" class="spinner" style="display: none;"></div>
      
      <!-- Dynamic content will be injected here by JavaScript -->
      <div id="tabPanel"></div>
    </div>
  </div>
</div>

<script>
  // ------------------------------------------------------------
  // Configuration – replace with your deployed Apps Script URL
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8L3ELi5SCrA_3lTlOnsS21DQJQAgLagxw23YPNF6hkK8TaW46Zac3G9ppnTKoZPiXgg/exec';  // <-- UPDATE THIS
  // ------------------------------------------------------------

  // Global state
  let currentUser = null;
  let currentLogId = null;
  let loginTime = null;
  let durationInterval = null;
  let inactivityTimer = null;
  const INACTIVITY_LIMIT = 60000; // 1 minute

  // Role -> tab access (1-indexed)
  const roleTabs = {
    bus: [2],
    teacher: [1,2,4],
    school: [1,3,4],
    manager: [1,2,3,4],
    admin: [1,2,3,4]
  };

  // DOM elements
  const loginArea = document.getElementById('loginArea');
  const mainApp = document.getElementById('mainApp');
  const userInfoDiv = document.getElementById('userInfo');
  const userNameSpan = document.getElementById('userName');
  const userRoleSpan = document.getElementById('userRole');
  const sessionDurationSpan = document.getElementById('sessionDuration');
  const logoutBtn = document.getElementById('logoutBtn');
  const tabContainer = document.getElementById('tabContainer');
  const tabPanel = document.getElementById('tabPanel');
  const loader = document.getElementById('loader');

  // ---------- Helper: show/hide loader ----------
  function showLoader(show) {
    loader.style.display = show ? 'block' : 'none';
  }

  // ---------- API call wrapper ----------
  async function callAppsScript(action, payload = {}) {
    showLoader(true);
    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...payload })
      });
      const data = await response.json();
      showLoader(false);
      return data;
    } catch (err) {
      showLoader(false);
      console.error(err);
      return { error: 'Network error' };
    }
  }

  // ---------- Inactivity logout ----------
  function resetInactivityTimer() {
    if (inactivityTimer) clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(() => {
      if (currentUser) {
        alert('Logged out due to inactivity.');
        logout();
      }
    }, INACTIVITY_LIMIT);
  }

  // Track user activity
  ['click', 'mousemove', 'keypress'].forEach(event => 
    document.addEventListener(event, resetInactivityTimer)
  );

  // ---------- Duration counter ----------
  function startDurationCounter() {
    if (durationInterval) clearInterval(durationInterval);
    durationInterval = setInterval(() => {
      if (!loginTime) return;
      const now = new Date();
      const diff = Math.floor((now - loginTime) / 1000); // seconds
      const mins = Math.floor(diff / 60).toString().padStart(2, '0');
      const secs = (diff % 60).toString().padStart(2, '0');
      sessionDurationSpan.textContent = `${mins}:${secs}`;
    }, 1000);
  }

  // ---------- Logout function (calls backend) ----------
  async function logout() {
    if (currentLogId) {
      const duration = sessionDurationSpan.textContent;
      await callAppsScript('recordLogout', { logId: currentLogId, duration });
    }
    // Clear storage
    if (!document.getElementById('keepMeLogin').checked) {
      localStorage.removeItem('savedUser');
    }
    // Reset UI
    currentUser = null;
    currentLogId = null;
    loginTime = null;
    clearInterval(durationInterval);
    if (inactivityTimer) clearTimeout(inactivityTimer);
    userInfoDiv.style.display = 'none';
    loginArea.style.display = 'grid';
    mainApp.style.display = 'none';
  }

  // ---------- After login success ----------
  async function onLoginSuccess(user) {
    currentUser = user;
    loginTime = new Date();
    // Record login in sheet
    const rec = await callAppsScript('recordLogin', { user });
    if (rec.success) {
      currentLogId = rec.logId;
    } else {
      console.warn('Could not record login');
    }

    // Show main app
    loginArea.style.display = 'none';
    mainApp.style.display = 'block';
    userInfoDiv.style.display = 'flex';
    userNameSpan.textContent = user.name;
    userRoleSpan.textContent = user.role;

    // Show allowed tabs
    const allowed = roleTabs[user.role] || [];
    document.querySelectorAll('.tab').forEach(tab => {
      const tabNum = parseInt(tab.dataset.tab);
      if (allowed.includes(tabNum)) {
        tab.classList.remove('hidden');
      } else {
        tab.classList.add('hidden');
      }
    });
    // Activate first allowed tab
    if (allowed.length) {
      activateTab(allowed[0]);
    }

    startDurationCounter();
    resetInactivityTimer();

    // If "keep me logged in" was checked, store user (without password)
    if (document.getElementById('keepMeLogin').checked) {
      localStorage.setItem('savedUser', JSON.stringify(user));
    }
  }

  // ---------- Tab switching ----------
  function activateTab(tabNumber) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tabNumber}"]`).classList.add('active');
    loadTabContent(tabNumber);
  }

  async function loadTabContent(tabNumber) {
    if (!currentUser) return;
    showLoader(true);
    // Render based on tab
    if (tabNumber === 1) await renderStudentsRecord();
    else if (tabNumber === 2) await renderAttendance();
    else if (tabNumber === 3) await renderData();
    else if (tabNumber === 4) await renderFee();
    showLoader(false);
  }

  // ---------- STUDENT LOGIN ----------
  document.getElementById('studentLoginBtn').addEventListener('click', async () => {
    const query = document.getElementById('studentSearchInput').value.trim();
    if (!query) return alert('Enter a name or phone');
    const result = await callAppsScript('searchStudent', { query });
    if (result.success && result.students.length > 0) {
      // For simplicity, take the first match as the logged-in student
      const student = result.students[0];
      // Create a pseudo user object
      const studentUser = {
        name: student.StudentName,
        role: 'student',
        id: student.Phone,
        data: student
      };
      await onLoginSuccess(studentUser);
    } else {
      alert('No student found');
    }
  });

  // ---------- OFFICIAL LOGIN ----------
  document.getElementById('officialLoginBtn').addEventListener('click', async () => {
    const userId = document.getElementById('officialUserId').value.trim();
    const password = document.getElementById('officialPassword').value.trim();
    if (!userId || !password) return alert('Enter both ID and password');
    const result = await callAppsScript('officialLogin', { userId, password });
    if (result.success) {
      await onLoginSuccess(result.user);
    } else {
      alert(result.error || 'Login failed');
    }
  });

  // ---------- Logout button ----------
  logoutBtn.addEventListener('click', logout);

  // ---------- Tab click handlers ----------
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      if (!currentUser) return;
      const tabNum = parseInt(tab.dataset.tab);
      activateTab(tabNum);
    });
  });

  // ---------- Check saved login ----------
  (async function init() {
    const saved = localStorage.getItem('savedUser');
    if (saved) {
      const user = JSON.parse(saved);
      // Re-login without password? We'll treat as valid (no backend check)
      await onLoginSuccess(user);
    }
  })();

  // ---------- Render functions (simplified examples) ----------
  async function renderStudentsRecord() {
    let filters = {};
    if (currentUser.role === 'teacher') {
      filters = { class: currentUser.class, division: currentUser.division };
    } else if (currentUser.role === 'school') {
      filters = { school: currentUser.school };
    }
    const result = await callAppsScript('getStudents', { role: currentUser.role, filters });
    if (!result.success) return;
    const students = result.students;
    // Build HTML (simplified)
    let html = `
      <div class="search-bar">
        <input type="text" id="studentSearch" placeholder="Search by name or phone...">
        <button class="btn btn-secondary" id="addStudentBtn"><i class="fas fa-plus"></i> Add</button>
      </div>
      <div class="table-container">
        <table>
          <thead><tr><th>BusId</th><th>School</th><th>Name</th><th>Class</th><th>Div</th><th>Parent</th><th>Phone</th><th>Entry</th><th>Exit</th><th>Status</th><th>Fee</th><th>Actions</th></tr></thead>
          <tbody>
    `;
    students.forEach((s, idx) => {
      html += `<tr>
        <td>${s.BusId || ''}</td><td>${s.School || ''}</td><td>${s.StudentName || ''}</td><td>${s.Class || ''}</td><td>${s.Div || ''}</td>
        <td>${s['Parent Name'] || ''}</td><td>${s.Phone || ''}</td><td>${s.Entry || ''}</td><td>${s.Exit || ''}</td><td>${s.Status || ''}</td>
        <td>${s.Fee || ''}</td>
        <td><i class="fas fa-edit action-icon" data-row="${idx}" data-action="edit"></i> <i class="fas fa-trash action-icon" data-row="${idx}" data-action="delete"></i></td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    tabPanel.innerHTML = html;

    // Add event listeners for edit/delete (simplified – you would implement full forms)
    // For brevity, we skip full CRUD forms here – they would open modals or inline editors.
  }

  async function renderAttendance() {
    // Simple dropdown for bus (if role=bus, use that busId)
    let busId = '';
    if (currentUser.role === 'bus') busId = currentUser.busId;
    const html = `
      <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:center; margin-bottom:20px;">
        <select id="attendanceBusSelect" style="padding:12px; border-radius:40px; border:2px solid #e6ecf5;">
          <option value="Kl 32S 3091">Kl 32S 3091</option>
          <option value="Kl 32P 2526">Kl 32P 2526</option>
          <option value="KL 32Q 2536">KL 32Q 2536</option>
          <option value="KL 32G 8699">KL 32G 8699</option>
          <option value="KL 32K 5655">KL 32K 5655</option>
        </select>
        <button class="btn" id="loadAttendanceBtn">Load Students</button>
        <button class="btn-secondary" id="shareAttendanceBtn"><i class="fab fa-whatsapp"></i> Share to WhatsApp</button>
      </div>
      <div id="attendanceTable"></div>
    `;
    tabPanel.innerHTML = html;
    // Load data on button click (we'll skip full implementation for brevity)
  }

  async function renderData() {
    tabPanel.innerHTML = `<div class="message-box"><i class="fas fa-database"></i> Data search with filters (Bus, School, Name) – full table with fee months.</div>`;
  }

  async function renderFee() {
    tabPanel.innerHTML = `<div class="message-box"><i class="fas fa-credit-card"></i> Fee search by phone/name, update month payments, instant update.</div>`;
  }

  // In a full implementation, all CRUD operations would call the respective backend actions.
</script>
</body>
</html>
