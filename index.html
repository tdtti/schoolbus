<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Bus Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loaderOverlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    @media print {
    body * { visibility: hidden; }
    #receiptPrintArea, #receiptPrintArea * { visibility: visible; }
    #receiptPrintArea { 
        position: absolute; left: 0; top: 0; width: 105mm; height: 148mm; /* A6 size (1/4 A4) */
        border: 1px solid #000; padding: 10px;
    }
}
.receipt-card { width: 105mm; min-height: 148mm; border: 2px dashed #cbd5e1; margin: 0 auto; padding: 15px; background: #fff; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
    <div id="loaderOverlay"><div class="loader mb-2"></div><p class="font-bold text-blue-600">Processing...</p></div>

    <header id="appHeader" class="hidden bg-blue-700 text-white p-4 shadow flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-white text-blue-700 font-bold rounded-full flex items-center justify-center">Logo</div>
            <h1 class="text-xl font-bold">Bus Portal</h1>
        </div>
        <div class="text-right">
            <p id="welcomeUser" class="font-semibold"></p>
            <p id="sessionTime" class="text-xs text-blue-200"></p>
        </div>
        <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded text-sm font-bold shadow">Logout</button>
    </header>

    <div id="loginSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
            <h2 class="text-2xl font-bold text-center mb-6">Combined Login</h2>
            <div class="bg-gray-50 p-4 rounded border mb-4">
                <h3 class="font-bold text-sm text-gray-600 mb-2">STUDENT LOGIN</h3>
                <input type="text" id="stuSearch" placeholder="Phone or Name" class="w-full p-2 border rounded mb-2 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="loginStudent()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Search</button>
            </div>
            <div class="text-center font-bold text-gray-400 mb-4">OR</div>
            <div class="bg-gray-50 p-4 rounded border">
                <h3 class="font-bold text-sm text-gray-600 mb-2">OFFICIAL LOGIN</h3>
                <input type="text" id="offUser" placeholder="User ID" class="w-full p-2 border rounded mb-2 outline-none">
                <input type="password" id="offPass" placeholder="Password" class="w-full p-2 border rounded mb-2 outline-none">
                <label class="flex items-center gap-2 mb-2 text-sm"><input type="checkbox"> Keep me logged in</label>
                <button onclick="loginOfficial()" class="w-full bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700">Login</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden p-4 max-w-7xl mx-auto">
        <div id="tabs" class="flex flex-wrap gap-2 mb-4 border-b pb-2"></div>
        <div id="tabContent" class="bg-white p-4 rounded-lg shadow min-h-[60vh]"></div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx4_3QmCVd_OdbQARtz6Ah3WNgVMTOWj0qOPfJDkWZOSF4mosKD0dHt_dy4g5WL9zATTg/exec";
    const users = {
        "bus1": { pass: "buspass", role: "Bus", name: "Bus KL 32S 3091", filter: "KL 32S 3091", access: [2] },
        "teacher1": { pass: "teachpass", role: "Teacher", name: "Teacher A", tClass: "STD5", tDiv: "A", access: [1,2,4] },
        "school1": { pass: "schpass", role: "School", name: "TDEMNS Admin", tSchool: "TDEMNS", access: [1,3,4] },
        "admin": { pass: "adminpass", role: "Admin", name: "Super Admin", access: [1,2,3,4] }
    };
    
    let curUser=null, loginDT=null, durInt=null, inactTimer=null;
    let db = []; // Holds all student data
    let editID = null;

    const showLoad = () => document.getElementById('loaderOverlay').style.display='flex';
    const hideLoad = () => document.getElementById('loaderOverlay').style.display='none';
    const msg = (t, txt, i="info") => Swal.fire({title:t, text:txt, icon:i, confirmButtonColor:'#3b82f6'});

    // --- Session & Core ---
    function resetTimer() {
        clearTimeout(inactTimer);
        if(curUser) inactTimer = setTimeout(logout, 60000);
    }
    window.onload = resetTimer; document.onmousemove = resetTimer; document.onkeypress = resetTimer;

    async function fetchData() {
        showLoad();
        try {
            const r = await fetch(API_URL, {method:'POST', body:JSON.stringify({action:"getStudents"})}).then(x=>x.json());
            if(r.success) db = r.data;
        } catch(e) { msg("Error", "Network Fail", "error"); }
        hideLoad();
    }

    async function loginStudent() {
        const q = document.getElementById('stuSearch').value.toLowerCase();
        if(!q) return;
        await fetchData();
        const s = db.find(x => String(x.Phone).includes(q) || String(x.StudentName).toLowerCase().includes(q));
        if(s) startSession({role:"Student", name:s.StudentName, data:s});
        else msg("Not Found","No records match.","warning");
    }

    function loginOfficial() {
        const u = document.getElementById('offUser').value, p = document.getElementById('offPass').value;
        if(users[u] && users[u].pass === p) { startSession(users[u]); } else msg("Error","Invalid Login","error");
    }

    async function startSession(u) {
        curUser = u; loginDT = new Date(); resetTimer();
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('appHeader').classList.remove('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('welcomeUser').innerText = `Hello, ${u.name}`;
        durInt = setInterval(()=>{
            const d = Math.floor((new Date()-loginDT)/1000);
            document.getElementById('sessionTime').innerText = `Duration: ${Math.floor(d/60)}m ${d%60}s`;
        }, 1000);
        
        fetch(API_URL, {method:'POST', body:JSON.stringify({action:"log", user:u.name, type:"login"})});
        if(u.role !== "Student") await fetchData();
        renderTabs();
    }

    function logout() {
        curUser = null; clearInterval(durInt); clearTimeout(inactTimer);
        document.getElementById('loginSection').classList.remove('hidden');
        document.getElementById('appHeader').classList.add('hidden');
        document.getElementById('mainApp').classList.add('hidden');
        ['stuSearch','offUser','offPass'].forEach(id=>document.getElementById(id).value='');
    }

    // --- UI Routing ---
    function renderTabs() {
        const t = document.getElementById('tabs'); t.innerHTML = '';
        if(curUser.role === "Student") { loadTab(0); return; }
        const n = {1:"Students Record", 2:"Attendance", 3:"Data", 4:"Fee"};
        curUser.access.forEach(id => {
            const b = document.createElement('button');
            b.className = "px-4 py-2 bg-gray-200 hover:bg-blue-200 font-bold rounded text-sm";
            b.innerText = n[id]; b.onclick = () => loadTab(id); t.appendChild(b);
        });
        loadTab(curUser.access[0]);
    }

    function loadTab(id) {
        const c = document.getElementById('tabContent');
        if(id === 0) renderStudentDash(c);
        if(id === 1) renderTab1(c);
        if(id === 2) renderTab2(c);
        if(id === 3) renderTab3(c);
        if(id === 4) renderTab4(c);
    }

    // --- Filters ---
    function getFilteredDB() {
        return db.filter(s => {
            if(curUser.role==="Admin") return true;
            if(curUser.role==="School") return s.School === curUser.tSchool;
            if(curUser.role==="Teacher") return s.Class === curUser.tClass && s.Div === curUser.tDiv;
            if(curUser.role==="Bus") return s.BusId === curUser.filter;
            return false;
        });
    }

    // --- Student Dashboard (Login 1) ---
    function renderStudentDash(c) {
        const d = curUser.data;
        const m = ["Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];
        let trs = m.map(x => `<tr class="border-b"><td class="p-2">${x}</td><td class="p-2 text-green-600 font-bold">₹${d[x]||0}</td><td class="p-2 text-xs">${d[x+'Receipt']||'-'}</td><td class="p-2 text-xs">${d[x+'DateTime']||'-'}</td></tr>`).join('');
        c.innerHTML = `
            <div class="bg-blue-50 p-4 rounded mb-4">
                <h2 class="text-xl font-bold mb-2">My Profile</h2>
                <p><b>Name:</b> ${d.StudentName} | <b>School:</b> ${d.School} | <b>Class:</b> ${d.Class}-${d.Div}</p>
                <p><b>Entry:</b> ${d.Entry} | <b>Exit:</b> ${d.Exit}</p>
                <p class="mt-2 text-lg"><b>Total Paid:</b> ₹${d.Total||0} <span class="ml-4 text-red-500"><b>Balance:</b> ₹${d.Balance||0}</span></p>
            </div>
            <button class="bg-indigo-500 text-white px-4 py-2 rounded text-sm mb-4">Download PDF</button>
            <div class="overflow-x-auto"><table class="w-full text-left border"><tr class="bg-gray-800 text-white"><th class="p-2">Month</th><th class="p-2">Fee Paid</th><th class="p-2">Receipt</th><th class="p-2">Date/Time</th></tr>${trs}</table></div>
        `;
    }

    // --- Tab 1: Students Record ---
    function renderTab1(c) {
        const fDB = getFilteredDB();
        c.innerHTML = `
            <h2 class="text-2xl font-bold mb-4">Manage Students</h2>
            <form id="sForm" onsubmit="saveS(event)" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 bg-gray-50 p-4 rounded border text-sm">
                <select id="f1" required class="p-2 border rounded"><option value="">Bus</option><option>Kl 32S 3091</option><option>Kl 32P 2526</option><option>KL 32Q 2536</option><option>KL 32G 8699</option><option>KL 32K 5655</option></select>
                <select id="f2" required class="p-2 border rounded"><option value="">School</option><option>TDEMNS</option><option>GTDLPS</option><option>TDTTI</option><option>TDHS</option></select>
                <select id="f3" required class="p-2 border rounded"><option value="">Class</option><option>PRE</option><option>LKG</option><option>UKG</option><option>STD1</option><option>STD5</option><option>STD10</option></select>
                <select id="f4" required class="p-2 border rounded"><option value="">Div</option><option>A</option><option>B</option><option>C</option></select>
                <input id="f5" required placeholder="Student Name" class="p-2 border rounded md:col-span-2">
                <input id="f6" required placeholder="Parent Name" class="p-2 border rounded">
                <input id="f7" required placeholder="Phone" class="p-2 border rounded">
                <input id="f8" required placeholder="Entry Stop" class="p-2 border rounded">
                <input id="f9" required placeholder="Exit Stop" class="p-2 border rounded">
                <select id="f10" required class="p-2 border rounded"><option>Both Time</option><option>Morning Only</option><option>Evening Only</option></select>
                <input id="f11" required placeholder="Fee Amount" type="number" class="p-2 border rounded">
                <div class="col-span-2 md:col-span-4 flex gap-2"><button type="submit" id="sBtn" class="bg-blue-600 text-white px-6 py-2 rounded font-bold">Save</button><button type="button" onclick="renderTab1(document.getElementById('tabContent'))" class="bg-gray-400 text-white px-4 py-2 rounded hidden" id="cBtn">Cancel</button></div>
            </form>
            <input type="text" onkeyup="searchT1(this.value)" placeholder="Search Name or Phone..." class="w-full p-2 border-2 rounded mb-2">
            <div class="overflow-x-auto"><table class="w-full text-left text-sm border"><tr class="bg-gray-800 text-white"><th class="p-2">Bus</th><th class="p-2">Name</th><th class="p-2">Class</th><th class="p-2">Phone</th><th class="p-2">Fee</th><th class="p-2">Action</th></tr>
            <tbody id="t1Body">
                ${fDB.map(s=>`<tr><td class="p-2 border-b">${s.BusId}</td><td class="p-2 border-b font-bold">${s.StudentName}</td><td class="p-2 border-b">${s.Class}-${s.Div}</td><td class="p-2 border-b">${s.Phone}</td><td class="p-2 border-b">₹${s.Fee}</td>
                <td class="p-2 border-b"><button onclick='editS(${JSON.stringify(s).replace(/'/g,"&#39;")})' class="bg-amber-500 text-white px-2 py-1 rounded text-xs">Edit</button>
                <button onclick="delS(${s._rowIndex})" class="bg-red-500 text-white px-2 py-1 rounded text-xs ml-1">Del</button></td></tr>`).join('')}
            </tbody></table></div>
        `;
    }

    async function saveS(e) {
        e.preventDefault();
        const d = { BusId:v('f1'), School:v('f2'), Class:v('f3'), Div:v('f4'), StudentName:v('f5'), ParentName:v('f6'), Phone:v('f7'), Entry:v('f8'), Exit:v('f9'), Status:v('f10'), Fee:v('f11') };
        showLoad();
        await fetch(API_URL, {method:'POST', body:JSON.stringify({action: editID?"updateStudent":"saveStudent", data:d, rowIndex:editID})});
        editID = null; await fetchData(); hideLoad(); renderTab1(document.getElementById('tabContent')); msg("Success","Record saved!","success");
    }
    const v = (id) => document.getElementById(id).value;
    const setV = (id, val) => document.getElementById(id).value = val;

    function editS(s) {
        editID = s._rowIndex; setV('f1',s.BusId); setV('f2',s.School); setV('f3',s.Class); setV('f4',s.Div); setV('f5',s.StudentName); setV('f6',s['Parent Name']||s.ParentName); setV('f7',s.Phone); setV('f8',s.Entry); setV('f9',s.Exit); setV('f10',s.Status); setV('f11',s.Fee);
        document.getElementById('sBtn').innerText = "Update"; document.getElementById('sBtn').className = "bg-amber-500 text-white px-6 py-2 rounded font-bold"; document.getElementById('cBtn').classList.remove('hidden');
    }

    async function delS(r) {
        if(!confirm("Delete forever?")) return;
        showLoad(); await fetch(API_URL, {method:'POST', body:JSON.stringify({action:"deleteStudent", rowIndex:r})});
        await fetchData(); hideLoad(); renderTab1(document.getElementById('tabContent'));
    }
    function searchT1(q) { Array.from(document.getElementById('t1Body').rows).forEach(r=> r.style.display = r.innerText.toLowerCase().includes(q.toLowerCase())?'':'none'); }

    // --- Tab 2: Attendance ---
    function renderTab2(c) {
        c.innerHTML = `
            <h2 class="text-2xl font-bold mb-4">Mark Attendance</h2>
            <div class="flex gap-2 mb-4">
                <select id="aBus" onchange="loadAttTbl()" class="p-2 border rounded w-1/3"><option value="">Select Bus</option><option>Kl 32S 3091</option><option>Kl 32P 2526</option></select>
                <select id="aSec" class="p-2 border rounded"><option>FN</option><option>AN</option></select>
                <button onclick="saveAtt()" class="bg-green-600 text-white px-4 rounded font-bold">Submit to Sheets</button>
            </div>
            <div class="flex gap-2 mb-4 bg-gray-50 p-2 rounded">
                <select id="waNum" class="p-2 border rounded text-sm"><option value="">Select WhatsApp Contact</option><option>+919999999991</option><option>+919999999992</option></select>
                <button onclick="shareWA()" class="bg-green-500 text-white px-4 rounded text-sm">Share Report</button>
            </div>
            <div class="overflow-x-auto"><table class="w-full text-left text-sm border"><tr class="bg-gray-800 text-white"><th class="p-2">Name</th><th class="p-2">School</th><th class="p-2">Class</th><th class="p-2">Action</th></tr>
            <tbody id="attBody"><tr><td colspan="4" class="p-4 text-center">Select bus to load students</td></tr></tbody></table></div>
        `;
    }
    function loadAttTbl() {
        const bus = document.getElementById('aBus').value;
        const sList = db.filter(s => s.BusId === bus);
        document.getElementById('attBody').innerHTML = sList.map((s,i) => `<tr><td class="p-2 border-b" id="anm${i}">${s.StudentName}</td><td class="p-2 border-b" id="asc${i}">${s.School}</td><td class="p-2 border-b" id="acl${i}">${s.Class}-${s.Div}</td><td class="p-2 border-b"><select id="ast${i}" class="border p-1 rounded"><option>Present</option><option>Absent</option></select></td></tr>`).join('');
    }
    async function saveAtt() {
        const bus = document.getElementById('aBus').value, sec = document.getElementById('aSec').value;
        if(!bus) return msg("Error","Select Bus","warning");
        const r = Array.from(document.getElementById('attBody').rows).map((row,i) => ({ BusId:bus, Section:sec, Name:document.getElementById(`anm${i}`).innerText, School:document.getElementById(`asc${i}`).innerText, Class:document.getElementById(`acl${i}`).innerText, Div:"", Status:document.getElementById(`ast${i}`).value }));
        showLoad(); await fetch(API_URL, {method:'POST', body:JSON.stringify({action:"saveAttendance", data:r})}); hideLoad(); msg("Saved","Attendance logged!","success");
    }
    function shareWA() {
        const n = document.getElementById('waNum').value; if(!n) return msg("Error","Select number","warning");
        let txt = `Attendance Report - ${document.getElementById('aBus').value}\n`;
        Array.from(document.getElementById('attBody').rows).forEach((r,i) => txt += `${document.getElementById(`anm${i}`).innerText}: ${document.getElementById(`ast${i}`).value}\n`);
        window.open(`https://wa.me/${n}?text=${encodeURIComponent(txt)}`, '_blank');
    }

    // --- Tab 3: Data ---
    function renderTab3(c) {
    const fDB = getFilteredDB();
    c.innerHTML = `
        <h2 class="text-2xl font-bold mb-4">Master Data & History</h2>
        <div class="flex gap-2 mb-4">
            <input id="dSearch" onkeyup="searchT3()" placeholder="Search Name, Phone, or Bus..." class="w-full p-2 border-2 border-blue-100 rounded-lg outline-none focus:border-blue-500">
        </div>
        <div class="overflow-x-auto bg-white rounded-lg border shadow-sm">
            <table class="w-full text-left text-xs border-collapse">
                <tr class="bg-gray-800 text-white">
                    <th class="p-3">Bus/School</th>
                    <th class="p-3">Student Name</th>
                    <th class="p-3">Phone</th>
                    <th class="p-3">Paid/Bal</th>
                    <th class="p-3">History</th>
                </tr>
                <tbody id="t3Body">
                    ${fDB.map(s => `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-3">${s.BusId}<br><span class="text-gray-400">${s.School}</span></td>
                            <td class="p-3 font-bold">${s.StudentName}<br><span class="font-normal text-gray-500">${s.Class}-${s.Div}</span></td>
                            <td class="p-3">${s.Phone}</td>
                            <td class="p-3">
                                <span class="text-green-600">P: ₹${s.Total || 0}</span><br>
                                <span class="text-red-500">B: ₹${s.Balance || 0}</span>
                            </td>
                            <td class="p-3">
                                <button onclick="gotoReceipts('${s.Phone}')" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-bold hover:bg-blue-200 transition">View Receipts</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
}

function gotoReceipts(phone) {
    // 1. Switch Tab
    loadTab(5); 

    // 2. Use a robust check to see if the element is ready
    let attempts = 0;
    const checkExist = setInterval(() => {
        const searchInput = document.getElementById('rSearch');
        if (searchInput) {
            clearInterval(checkExist);
            searchInput.value = phone;
            findReceiptStu(); // Trigger the actual search
        }
        if (++attempts > 10) clearInterval(checkExist); // Stop after 2 seconds if fail
    }, 200); 
}

    function searchT3() { const q=document.getElementById('dSearch').value.toLowerCase(); Array.from(document.getElementById('t3Body').rows).forEach(r=> r.style.display = r.innerText.toLowerCase().includes(q)?'':'none'); }

    // --- Tab 4: Fee ---
    function renderTab4(c) {
        c.innerHTML = `
            <h2 class="text-2xl font-bold mb-4">Fee Management</h2>
            <div class="flex gap-2 mb-6"><input type="text" id="fSearch" placeholder="Phone or Name" class="p-2 border rounded w-1/2"><button onclick="findFeeStu()" class="bg-blue-600 text-white px-4 rounded font-bold">Find</button></div>
            <div id="feeArea" class="hidden">
                <div class="bg-blue-50 p-4 rounded mb-4 shadow-sm border border-blue-100" id="feeDetails"></div>
                <div class="flex gap-2 mb-4 bg-gray-50 p-4 rounded border">
                    <select id="feeMon" class="p-2 border rounded"><option>Jun</option><option>Jul</option><option>Aug</option><option>Sep</option><option>Oct</option><option>Nov</option><option>Dec</option><option>Jan</option><option>Feb</option><option>Mar</option></select>
                    <input type="number" id="feeAmt" placeholder="Amount" class="p-2 border rounded">
                    <button onclick="payFee()" class="bg-green-600 text-white px-6 rounded font-bold hover:bg-green-700">Enter Fee</button>
                    <button class="bg-indigo-500 text-white px-4 rounded ml-auto text-sm">PDF / WA</button>
                </div>
                <div class="overflow-x-auto"><table class="w-full text-left text-sm border bg-white"><tr class="bg-gray-800 text-white"><th class="p-2">Month</th><th class="p-2">Amount Paid</th><th class="p-2">Receipt</th><th class="p-2">Date/Time</th></tr><tbody id="feeTable"></tbody></table></div>
            </div>
        `;
    }
    let curFeeS = null;
    function findFeeStu() {
        const q = document.getElementById('fSearch').value.toLowerCase();
        curFeeS = getFilteredDB().find(x => String(x.Phone).includes(q) || String(x.StudentName).toLowerCase().includes(q));
        if(!curFeeS) return msg("Not Found","Student not found in your access scope.","warning");
        document.getElementById('feeArea').classList.remove('hidden');
        document.getElementById('feeDetails').innerHTML = `<h3 class="text-lg font-bold">${curFeeS.StudentName}</h3><p class="text-sm">${curFeeS.School} | ${curFeeS.Class}-${curFeeS.Div} | Bus: ${curFeeS.BusId}</p><p class="mt-2 text-blue-700 font-bold">Monthly Fee Base: ₹${curFeeS.Fee}</p><div class="flex justify-between mt-2 pt-2 border-t border-blue-200"><span class="font-bold text-green-700">Total Paid: ₹${curFeeS.Total||0}</span><span class="font-bold text-red-600">Balance: ₹${curFeeS.Balance||0}</span></div>`;
        const m = ["Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];
        document.getElementById('feeTable').innerHTML = m.map(x => `<tr class="border-b"><td class="p-2">${x}</td><td class="p-2 font-bold text-green-600">₹${curFeeS[x]||0}</td><td class="p-2 text-xs">${curFeeS[x+'Receipt']||'-'}</td><td class="p-2 text-xs">${curFeeS[x+'DateTime']||'-'}</td></tr>`).join('');
    }
    async function payFee() {
        const m = document.getElementById('feeMon').value, a = document.getElementById('feeAmt').value;
        if(!a) return msg("Error","Enter amount","warning");
        showLoad(); await fetch(API_URL, {method:'POST', body:JSON.stringify({action:"saveFee", rowIndex:curFeeS._rowIndex, data:{month:m, amount:a}})});
        await fetchData(); hideLoad(); findFeeStu(); msg("Success","Fee updated instantly!","success");
    }
    
    function renderTab5(c) {
    c.innerHTML = `
        <div class="p-4">
            <h2 class="text-2xl font-bold mb-4 text-blue-800 border-b-2 border-blue-100 pb-2">Receipt Management</h2>
            
            <div class="flex gap-2 mb-6 bg-white p-4 rounded-xl shadow-sm border">
                <div class="flex-1">
                    <label class="text-[10px] uppercase font-bold text-gray-400 ml-1">Search by Phone</label>

                           class="w-full p-2 border-2 rounded-lg outline-none focus:border-blue-500 text-lg">
                </div>
                <button onclick="findReceiptStu()" class="self-end bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-lg font-bold shadow-md transition-all">
                    Search
                </button>
            </div>

            <div id="receiptResult" class="hidden space-y-6">
                <div id="rStuInfo" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <div class="bg-gray-50 px-4 py-3 border-b">
                        <h3 class="font-bold text-gray-700">Generate New Receipt</h3>
                    </div>
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 uppercase text-[10px] tracking-wider">
                                <th class="p-3">Month</th>
                                <th class="p-3">Paid Amount</th>
                                <th class="p-3">Ref No.</th>
                                <th class="p-3 text-center">Action</th>
                            </tr>

                        <tbody id="rPaymentTbl"></tbody>

                <div>
                    <h3 class="font-bold text-gray-700 mb-3 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span> 
                        Generated History
                    </h3>
                    <div id="historyArea" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <p class="text-gray-400 italic text-sm">No history loaded.</p>

            <div id="receiptPrintArea" class="hidden"></div>

}

let curRStu = null;

async function findReceiptStu() {
    const q = document.getElementById('rSearch').value.trim();
    if (!q) return;

    // Normalize phone numbers by removing any non-digit characters for comparison
    const cleanQ = q.replace(/\D/g, '');
    
    curRStu = db.find(x => {
        const cleanPhone = String(x.Phone).replace(/\D/g, '');
        return cleanPhone === cleanQ || String(x.StudentName).toLowerCase().includes(q.toLowerCase());
    });

    if (!curRStu) {
        msg("Not Found", "No student matches this phone or name in your current records.", "warning");
        document.getElementById('receiptResult').classList.add('hidden');
        return;
    }

    // Show the result section
    document.getElementById('receiptResult').classList.remove('hidden');
    
    // Update Student Info Header
    document.getElementById('rStuInfo').innerHTML = `
        <div class="p-4 bg-blue-50 rounded-lg border border-blue-200">
            <h3 class="text-lg font-bold text-blue-800">${curRStu.StudentName}</h3>
            <p class="text-sm"><b>School:</b> ${curRStu.School} | <b>Bus:</b> ${curRStu.BusId}</p>
            <p class="text-sm"><b>Class:</b> ${curRStu.Class}-${curRStu.Div} | <b>Phone:</b> ${curRStu.Phone}</p>
        </div>
        <div class="p-4 bg-green-50 rounded-lg border border-green-200 text-right">
            <p class="text-sm"><b>Monthly Fee:</b> ₹${curRStu.Fee}</p>
            <p class="text-lg font-bold text-green-700">Paid: ₹${curRStu.Total || 0}</p>
            <p class="text-lg font-bold text-red-600">Balance: ₹${curRStu.Balance || 0}</p>
        </div>
    `;

    // Render the Payments Table
    const months = ["Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];
    const tbody = document.getElementById('rPaymentTbl');
    tbody.innerHTML = '';

    let hasPayments = false;
    months.forEach(m => {
        if (curRStu[m] && parseFloat(curRStu[m]) > 0) {
            hasPayments = true;
            tbody.innerHTML += `
                <tr class="hover:bg-gray-50">
                    <td class="p-3 border font-bold">${m}</td>
                    <td class="p-3 border text-green-600 font-bold">₹${curRStu[m]}</td>
                    <td class="p-3 border text-gray-500">${curRStu[m+'Receipt'] || 'N/A'}</td>
                    <td class="p-3 border text-center">
                        <button onclick="generateReceiptUI('${m}')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1 rounded shadow-sm text-xs font-bold uppercase">Generate</button>
                    </td>
                </tr>`;
        }
    });

    if (!hasPayments) {
        tbody.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-gray-400 italic">No payments recorded for this student yet.</td></tr>`;
    }

    // Fetch and show history from the "Receipts" sheet
    fetchHistory(cleanQ);
}



async function generateReceiptUI(month) {
    const rData = {
        ReceiptNo: curRStu[month+'Receipt'] || ('R-' + Date.now().toString().slice(-6)),
        Date: curRStu[month+'DateTime'],
        Name: curRStu.StudentName,
        Phone: curRStu.Phone,
        School: curRStu.School,
        Class: curRStu.Class + "-" + curRStu.Div,
        Months: month,
        Amount: curRStu[month],
        Total: curRStu[month]
    };
    
    // Save to Google Sheet "Receipts" sheet
    showLoad();
    try {
        await fetch(API_URL, {
            method: 'POST', 
            body: JSON.stringify({action: "saveGeneratedReceipt", data: rData})
        });
        hideLoad();
        renderReceiptTemplate(rData);
        // Refresh the history list below
        findReceiptStu(); 
    } catch(e) {
        hideLoad();
        msg("Error", "Could not save receipt to history.", "error");
    }
}

function renderReceiptTemplate(r) {
    const html = `
        <div class="receipt-card">
            <div class="text-center border-b pb-2 mb-2">
                <div class="flex justify-center items-center gap-2">
                     <div class="w-8 h-8 bg-blue-700 text-white font-bold rounded flex items-center justify-center text-xs">LOGO</div>
                     <h2 class="font-bold text-lg">${r.School}</h2>
                </div>
                <p class="text-[10px] uppercase tracking-widest">School Bus Transportation Receipt</p>
            </div>
            <div class="flex justify-between text-[11px] mb-2">
                <span><b>No:</b> ${r.ReceiptNo}</span>
                <span><b>Date:</b> ${new Date().toLocaleDateString()}</span>
            </div>
            <div class="text-[12px] space-y-1 mb-4">
                <p><b>Student:</b> ${r.Name}</p>
                <p><b>Class:</b> ${r.Class} | <b>Phone:</b> ${r.Phone}</p>
            </div>
            <table class="w-full text-[12px] border-collapse mb-4">
                <thead class="bg-gray-100">
                    <tr><th class="border p-1 text-left">Particulars</th><th class="border p-1 text-right">Amount</th></tr>
                </thead>
                <tbody>
                    <tr><td class="border p-1">Bus Fee for ${r.Months}</td><td class="border p-1 text-right">₹${r.Amount}</td></tr>
                    <tr class="font-bold"><td class="border p-1 text-right">Total</td><td class="border p-1 text-right">₹${r.Total}</td></tr>
                </tbody>
            </table>
            <div class="text-[10px] text-center mt-10">
                <p>Authorized Signature</p>
                <div class="border-t border-black w-24 mx-auto mt-4"></div>
            </div>
            <div class="mt-4 flex gap-2 no-print justify-center">
                <button onclick="window.print()" class="bg-gray-800 text-white px-4 py-1 rounded text-xs">Print</button>
                <button onclick="shareReceiptWA('${r.Months}', '${r.Total}')" class="bg-green-600 text-white px-4 py-1 rounded text-xs">WhatsApp</button>
            </div>
        </div>
    `;
    document.getElementById('receiptPrintArea').innerHTML = html;
    document.getElementById('receiptPrintArea').classList.remove('hidden');
    Swal.fire({
        title: 'Receipt Generated',
        html: html,
        showConfirmButton: false,
        width: 'auto'
    });
}

function shareReceiptWA(mon, amt) {
    const txt = `*Receipt from ${curRStu.School}*\nStudent: ${curRStu.StudentName}\nMonth: ${mon}\nAmount Paid: ₹${amt}\nStatus: Completed`;
    window.open(`https://wa.me/${curRStu.Phone}?text=${encodeURIComponent(txt)}`, '_blank');
}

async function fetchHistory(phone) {
    const historyDiv = document.getElementById('historyArea');
    historyDiv.innerHTML = '<p class="text-gray-400 animate-pulse">Loading history...</p>';

    try {
        const res = await fetch(API_URL, {
            method: 'POST', 
            body: JSON.stringify({action: "getReceipts", phone: phone})
        }).then(r => r.json());

        if (res.success && res.data.length > 0) {
            // Remove header row if it exists in the filtered results
            const history = res.data.filter(row => row[0] !== "ReceiptNo");
            
            historyDiv.innerHTML = history.map(r => `
                <div class="flex justify-between items-center p-3 bg-white border rounded shadow-sm hover:border-blue-300 transition">
                    <div>
                        <p class="font-bold text-gray-700">${r[0]} <span class="text-xs font-normal text-gray-400">(${r[7]})</span></p>
                        <p class="text-[10px] text-gray-500">${new Date(r[1]).toLocaleString()}</p>
                    </div>
                    <div class="flex gap-2">
                         <button onclick="reprint('${r[0]}')" class="text-blue-600 text-xs font-bold border border-blue-600 px-2 py-1 rounded">Reprint</button>
                    </div>
                </div>
            `).join('');
        } else {
            historyDiv.innerHTML = '<p class="text-gray-400 text-sm italic">No generated receipt history found.</p>';
        }
    } catch (e) {
        historyDiv.innerHTML = '<p class="text-red-400 text-sm">Failed to load history.</p>';
    }
}
